{% extends 'base.html' %}
{% block content %}

<style>

/* card */
.card{
    background: rgba(255,255,255,0.13);
    padding:40px;
    border-radius:22px;
    width:100%;
    max-width:420px;
    text-align:center;
    backdrop-filter: blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,.55);
    animation:fadeIn .6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:18px;
}

/* inputs */
input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    margin-bottom:15px;
    font-size:15px;
}

/* select2 fix */
.select2-container{
    width:100% !important;
    margin-bottom:10px;
}

.select2-container--default .select2-selection--single{
    height:52px !important;
    border-radius:12px !important;
    border:none !important;
    display:flex !important;
    align-items:center !important;
    padding-left:12px !important;
}

/* SWITCH BUTTON */
.switch-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    background:linear-gradient(135deg,#00f5d4,#0bbcd6);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:10px auto;
    cursor:pointer;
    font-size:20px;
    transition:.3s;
}

.switch-btn:hover{
    transform:rotate(180deg) scale(1.1);
    box-shadow:0 0 15px #00f5d4;
}

/* button */
button{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:none;
    background:linear-gradient(135deg,#00f5d4,#14e0c9);
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 15px #00f5d4;
}

/* LOADER */
.loader{
    width:35px;
    height:35px;
    border:4px solid #ffffff40;
    border-top:4px solid #00f5d4;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin:15px auto;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.result{
    margin-top:18px;
    font-size:22px;
    font-weight:600;
    animation:pop .5s ease;
}

@keyframes pop{
    from{opacity:0; transform:scale(.8);}
    to{opacity:1; transform:scale(1);}
}

</style>

<div class="card">
<h2>Currency Converter</h2>

<form method="POST" id="convertForm">
{% csrf_token %}

<input type="number" name="amount" placeholder="Enter Amount" required>

<!-- FROM -->
<select name="from_currency" class="currency" id="from">
<option value="USD" data-flag="us">USD - United States</option>
<option value="INR" data-flag="in">INR - India</option>
<option value="EUR" data-flag="eu">EUR - Europe</option>
<option value="GBP" data-flag="gb">GBP - United Kingdom</option>
<option value="JPY" data-flag="jp">JPY - Japan</option>
<option value="AUD" data-flag="au">AUD - Australia</option>
<option value="CAD" data-flag="ca">CAD - Canada</option>
</select>

<!-- SWITCH BUTTON -->
<div class="switch-btn" id="switch">⇅</div>

<!-- TO -->
<select name="to_currency" class="currency" id="to">
<option value="INR" data-flag="in">INR - India</option>
<option value="USD" data-flag="us">USD - United States</option>
<option value="EUR" data-flag="eu">EUR - Europe</option>
<option value="GBP" data-flag="gb">GBP - United Kingdom</option>
<option value="JPY" data-flag="jp">JPY - Japan</option>
<option value="AUD" data-flag="au">AUD - Australia</option>
<option value="CAD" data-flag="ca">CAD - Canada</option>
</select>

<button type="submit">Convert</button>

<!-- LOADING -->
<div class="loader" id="loader"></div>

</form>

{% if result %}
<div class="result">Converted Amount: {{ result }}</div>
{% endif %}

</div>

<script>

/* FLAG RENDER */
function formatCurrency(option){
    if(!option.id) return option.text;

    var flag = $(option.element).data('flag');
    var img = "https://flagcdn.com/w40/" + flag + ".png";

    return $('<span style="display:flex;align-items:center;gap:10px;">' +
        '<img src="'+img+'" style="width:26px;height:18px;border-radius:3px;">' +
        '<span>'+option.text+'</span></span>');
}

$('.currency').select2({
    templateResult: formatCurrency,
    templateSelection: formatCurrency,
    escapeMarkup: function(m){ return m; },
    minimumResultsForSearch:-1
});

/* SWITCH BUTTON LOGIC */
document.getElementById("switch").onclick = function(){
    let from = document.getElementById("from");
    let to = document.getElementById("to");

    let temp = from.value;
    from.value = to.value;
    to.value = temp;

    $('#from').trigger('change');
    $('#to').trigger('change');
};

/* LOADING ANIMATION */
document.getElementById("convertForm").addEventListener("submit", function(){
    document.getElementById("loader").style.display="block";
});

</script>

{% endblock %}
